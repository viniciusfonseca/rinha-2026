name: CI Test K6

on:
  push:
    branches:
      - main

jobs:
  ci-k6-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up k6
        uses: grafana/setup-k6-action@v1
      - name: Run make test-ci
        run: make test-ci