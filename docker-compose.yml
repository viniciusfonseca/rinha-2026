services:
  lb:
    build:
      context: .
      dockerfile: Dockerfile
    image: rinha-2026-local
    platform: linux/amd64
    command: ["/usr/local/bin/fraud_lb"]
    environment:
      BACKENDS: unix:/run/rinha/api1.sock,unix:/run/rinha/api2.sock
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "48MB"
    volumes:
      - rinha-sockets:/run/rinha
    networks:
      - rinha

  api1:
    image: rinha-2026-local
    platform: linux/amd64
    command: ["/usr/local/bin/fraud_api"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RINHA_INDEX_PATH: /opt/rinha/index.bin
      API_SOCKET_PATH: /run/rinha/api1.sock
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "151MB"
    volumes:
      - rinha-sockets:/run/rinha
    networks:
      - rinha

  api2:
    image: rinha-2026-local
    platform: linux/amd64
    command: ["/usr/local/bin/fraud_api"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RINHA_INDEX_PATH: /opt/rinha/index.bin
      API_SOCKET_PATH: /run/rinha/api2.sock
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "151MB"
    volumes:
      - rinha-sockets:/run/rinha
    networks:
      - rinha

volumes:
  rinha-sockets:

networks:
  rinha:
    driver: bridge
